    /* ── colors_and_type.css (inlined) ─────────────────────── */
/* ============================================================
   Stephen Mann Design System — Foundation Tokens
   Distilled from stephendmann.com (Next.js / Tailwind / Swiss-grid)
   ============================================================ */

/* ─── 1. WEBFONTS ───────────────────────────────────────────
   Inter is the only typeface. It carries the wordmark, every
   heading, body, UI label, and quote.
   The previous Merriweather (serif italic) path has been
   removed — do not reintroduce a second family. */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

/* ─── 2. BASE TOKENS (light theme = default) ──────────────── */
:root {
  /* Brand palette — raw hex from tailwind.config.js / globals.css */
  --color-teal:      #005577;   /* primary — buttons, accents, headlines */
  --color-mist:      #E6F0FA;   /* light bg surface, credential badges */
  --color-steel:     #778DA9;   /* secondary text, muted, "Digital" accent */
  --color-charcoal:  #1B263B;   /* body text on light bg */
  --color-offwhite:  #F5F6F5;   /* light-mode page bg */
  --color-midnight:  #0D1B2A;   /* dark-mode page bg */

  /* Service accents (only used on Services cards) */
  --color-accent-consulting: #005577;
  --color-accent-digital:    #778DA9;
  --color-accent-students:   #2E8B74;

  /* Dark-mode teal — AA-compliant on midnight */
  --color-teal-dark: #4DA8CF;

  /* Headline gradient (hero only) */
  --gradient-headline: linear-gradient(135deg, #00bbee 0%, #0099cc 35%, #55c8e0 65%, #d0f0ff 100%);

  /* Hero scrim — sits over /assets/imagery/* hero backgrounds */
  --gradient-hero-scrim: linear-gradient(
    to bottom,
    rgba(13,27,42,0.75) 0%,
    rgba(13,27,42,0.55) 15%,
    rgba(13,27,42,0.20) 40%,
    rgba(13,27,42,0.30) 65%,
    rgba(13,27,42,0.60) 100%
  );

  /* ── Semantic surfaces ── */
  --bg:       var(--color-offwhite);
  --fg:       var(--color-charcoal);
  --fg-muted: var(--color-steel);
  --accent:   var(--color-teal);
  --surface:  #ffffff;
  --border:   rgba(0,85,119,0.12);     /* teal @ 12% — every border on the site */
  --border-strong: rgba(0,85,119,0.30);

  /* ── Status (semantic) — derived for forms / banners ── */
  --status-success: #2E8B74;
  --status-info:    #005577;
  --status-warn:    #C28F2C;
  --status-danger:  #B83A3A;

  /* ─── 3. TYPOGRAPHY ─────────────────────────────────────── */
  --font-sans:  'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:  ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  /* --font-serif: DEPRECATED — Inter only. Quotes use italic Inter at .sds-quote. */

  /* Type scale — clamp() responsive sizes from tailwind.config.js */
  /* Hero lockup (one-use): keeps the older display token */
  --fs-display: clamp(3rem, 8vw, 7rem);
  --lh-display: 0.95;
  --ls-display: -0.03em;

  /* Reusable scale — Inter only, more compact */
  --fs-h1:      clamp(2.2rem, 3vw, 3rem);
  --fs-h2:      clamp(1.7rem, 2.4vw, 2.2rem);
  --fs-h3:      1.5rem;
  --fs-body:    1rem;
  --fs-small:   0.875rem;
  --fs-eyebrow: 0.95rem;
  --fs-nav:     0.95rem;

  --lh-h1:      1.08;
  --lh-h2:      1.18;
  --lh-h3:      1.3;
  --lh-body:    1.65;
  --lh-small:   1.5;

  --fw-h1: 700;
  --fw-h2: 600;
  --fw-h3: 600;

  --ls-h1:      -0.02em;
  --ls-h2:      -0.015em;
  --ls-h3:      -0.01em;
  --ls-wordmark: -0.04em;
  --ls-eyebrow: 0.18em;
  --ls-nav:     0.12em;
  --ls-button:  0.04em;

  /* ─── 4. SPACING — Swiss grid scale ────────────────────── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-section-sm: 4rem;
  --space-section:    clamp(4rem, 8vw, 8rem);

  --container-max:    1400px;
  --container-wide:   1100px;
  --container-narrow: 760px;
  --container-pad:    clamp(1.5rem, 5vw, 5rem);
  --max-prose:        72ch;

  /* ─── 5. RADII — Swiss = sharp ──────────────────────────── */
  --radius:    0rem;                  /* default everywhere */
  --radius-sm: 0rem;
  --radius-md: 0rem;
  --radius-lg: 0rem;
  --radius-pill: 999px;               /* only avatars, share buttons, dark-mode toggle */

  /* ─── 6. SHADOW SYSTEM ──────────────────────────────────── */
  --shadow-card:        0 16px 40px rgba(0,0,0,0.08);   /* card hover lift */
  --shadow-card-dark:   0 16px 40px rgba(0,0,0,0.35);
  --shadow-nav-scroll:  0 1px 0 rgba(0,0,0,0.04);
  --shadow-text-on-hero: 0 1px 4px rgba(0,0,0,0.6);
  --shadow-drop-hero:    drop-shadow(0 2px 14px rgba(0,0,0,0.55));

  /* ─── 7. MOTION ─────────────────────────────────────────── */
  --ease-out:  cubic-bezier(.16,.84,.44,1);
  --ease-std:  ease;
  --dur-1: 0.15s;
  --dur-2: 0.2s;
  --dur-3: 0.3s;
  --dur-4: 0.6s;
  --dur-5: 0.7s;
}

/* ─── 8. DARK THEME ──────────────────────────────────────── */
.dark, [data-theme="dark"] {
  --bg:       var(--color-midnight);
  --fg:       var(--color-mist);
  --fg-muted: var(--color-steel);
  --accent:   var(--color-teal-dark);
  --surface:  #0F2335;
  --border:        rgba(230,240,250,0.10);
  --border-strong: rgba(230,240,250,0.24);
}

/* ─── 9. SEMANTIC ELEMENT DEFAULTS ───────────────────────── */
html, body { background: var(--bg); color: var(--fg); }
body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4, h5, h6 { font-family: var(--font-sans); font-weight: 700; color: var(--fg); }

.sds-display, h1.sds-display {
  font-size: var(--fs-display);
  line-height: var(--lh-display);
  letter-spacing: var(--ls-display);
  font-weight: 800;
}
h1, .sds-h1 {
  font-size: var(--fs-h1);
  line-height: var(--lh-h1);
  letter-spacing: var(--ls-h1);
  font-weight: var(--fw-h1);
}
h2, .sds-h2 {
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  letter-spacing: var(--ls-h2);
  font-weight: var(--fw-h2);
}
h3, .sds-h3 {
  font-size: var(--fs-h3);
  line-height: var(--lh-h3);
  letter-spacing: var(--ls-h3);
  font-weight: var(--fw-h3);
}

/* ── Wordmark — the brand's bold uppercase signature */
.sds-wordmark {
  font-family: var(--font-sans);
  font-weight: 800;
  letter-spacing: var(--ls-wordmark);
  font-size: clamp(1.1rem, 2vw, 1.4rem);
  color: var(--color-teal);
  text-transform: uppercase;
}

/* ── Eyebrow / section label — appears above EVERY section */
.sds-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-eyebrow);
  font-weight: 700;
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
  color: var(--color-teal);
}

/* ── Tagline / pull-quote — italic Inter, no serif fallback */
.sds-tagline, blockquote.sds-quote p {
  font-family: var(--font-sans);
  font-style: italic;
  font-weight: 400;
  font-size: 1.05rem;
  line-height: 1.6;
  color: var(--fg);
}

/* ── Headline gradient — hero "Leadership Intelligence" moment */
.sds-headline-gradient {
  background: var(--gradient-headline);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Body small + nav link */
small, .sds-small { font-size: var(--fs-small); line-height: var(--lh-small); color: var(--fg-muted); }
.sds-nav-link {
  font-size: var(--fs-nav);
  font-weight: 600;
  letter-spacing: var(--ls-nav);
  text-transform: uppercase;
  color: var(--fg-muted);
  text-decoration: none;
}

/* ── Code / mono — used for "01 —", "02 —" section numbers */
code, .sds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-small);
}

    /* ── fk-tokens.css (inlined) ───────────────────────────── */
/* Feedback Kitchen — design tokens (CSS mirror of fk-tokens.js v1.0)
 * ─────────────────────────────────────────────────────────────────────
 * Single source of truth for CSS-consuming FK surfaces. Mirrors
 * `fkTokens.asCssVars()` from fk-tokens.js — values are kept in lockstep
 * by the token-drift script (any divergence is a build failure).
 *
 * Scope is intentionally narrow:
 *   focus   — Phase 1 axe focus-ring contract (.fk-focus-ring utility)
 *   hero    — 3-stop hero gradient (replaces 2-stop drift hex pair)
 *   status  — success / warn / danger / info / muted fg+bg pairs
 *   slate   — slate.100 only; rest of slate ramp stays inlined per
 *             Phase 1 promotion-threshold rule
 *
 * NOT in scope: typography, spacing, radii, motion durations — those
 * live in colors_and_type.css under `--color-*`, `--fs-*`, `--space-*`,
 * `--dur-*`. The `--fk-` prefix avoids collision with brand tokens.
 *
 * Phase 1 cleared values (canon — Phase 0 D1 hero, D3 focus ring, etc.)
 */

:root {
  /* ── Focus ring ─────────────────────────────────────────────────── */
  --fk-focus-ring:      #005577;
  --fk-focus-halo:      rgba(0, 85, 119, 0.20);
  --fk-focus-width:     3px;
  --fk-focus-shadow:    0 0 0 3px rgba(0, 85, 119, 0.20), 0 0 0 1px #005577;

  /* ── Hero gradient (3-stop, mid stop 40% per Phase 0 D1) ────────── */
  --fk-hero:            linear-gradient(135deg, #1E3A8A 0%, #1E40AF 40%, #2563EB 100%);
  --fk-hero-lightest:   #2563EB;

  /* ── Status pairs (≥4.5:1 contrast locked) ──────────────────────── */
  --fk-status-success-fg: #047857;
  --fk-status-success-bg: #D1FAE5;
  --fk-status-warn-fg:    #92400E;
  --fk-status-warn-bg:    #FEF3C7;
  --fk-status-danger-fg:  #B91C1C;
  --fk-status-danger-bg:  #FEE2E2;
  --fk-status-info-fg:    #1D4ED8;
  --fk-status-info-bg:    #EFF6FF;
  --fk-status-muted-fg:   #475569;
  --fk-status-muted-bg:   #E2E8F0;

  /* ── Slate (only .100 promoted in Phase 1) ──────────────────────── */
  --fk-slate-100:       #F1F5F9;

  /* ── Card-lift shadow (paired with -1px hover translate, Phase 1) ── */
  --fk-card-lift:       0 10px 24px rgba(15, 23, 42, 0.08);

  /* ── Button-lift shadow (D1 hero CTA, Phase 5) ──────────────────────
   * Paired with the existing 0 1px 2px rgba(0,0,0,.08) rest shadow on
   * .fk-btn-primary. The hover state ramps to this stronger shadow over
   * .25s ease. No background inversion — the lift signal is the shadow,
   * not a colour flip. */
  --fk-btn-lift:        0 8px 20px rgba(15, 23, 42, 0.14);
}

/* ── Focus-ring utility ──────────────────────────────────────────────
 * Applied via `:focus-visible` so mouse users don't see the halo.
 * Pairs with `outline: 2px solid transparent` for high-contrast-mode
 * fallback.
 */
.fk-focus-ring:focus-visible {
  outline: 2px solid transparent;
  outline-offset: 0;
  box-shadow: var(--fk-focus-shadow);
}

/* ── Card-lift utility (Phase 5 F1 lock) ─────────────────────────────
 * Opt-in hover treatment that bundles the -1px translate + soft shadow
 * + transition. Any surface that wants the canonical "card lift" effect
 * applies this class as a co-class. Surfaces that already had the
 * effect baked in (.fk-card on the FK landing) keep their bespoke rule
 * for backward compatibility — the utility is the new path forward.
 *
 * Token contract: shadow value is --fk-card-lift; translate is -1px;
 * transition is .25s ease (matches the F2 status/tag cadence so the
 * whole motion system reads coherently). prefers-reduced-motion below
 * cancels the transform but leaves the shadow swap.
 */
.fk-card-lift {
  transition: transform .25s ease, box-shadow .25s ease;
}
.fk-card-lift:hover {
  transform: translateY(-1px);
  box-shadow: var(--fk-card-lift);
}

/* ── System-wide reduced-motion (Phase 1) ────────────────────────────
 * Honours OS preference by reducing transitions/animations to a 1ms
 * tick. Deliberately leaves colour transitions alone — they carry state
 * change information, not motion. Only translates and animations are
 * suppressed.
 */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
  .fk-card:hover,
  .fk-card-lift:hover,
  .fk-row:hover,
  .fk-btn-primary:hover { transform: none !important; }

  /* CF-1 row 10 · v0 keyframe-coverage gap.
   * The 1ms ceiling above already neutralises animations, but spec § M2.2
   * row 10 codifies `animation: none` for the four named keyframe carriers
   * (fkfade — modal overlay; fkslide — firstload + shortcut sheet; fkspin —
   * save-dot). Belt-and-braces against any future surface that bypasses the
   * 1ms duration with a longer inline override. The save-dot's animated
   * spinner gains a static amber fallback so the saving state stays
   * legible without rotation. */
  .fk-modal-overlay, .fk-modal-card,
  .firstload-card, .shortcuts-card,
  .save-dot { animation: none !important; }
  .save-dot.is-saving { background: var(--fk-amber); }   /* static fallback */
}

/* ── Skip-link utility (CF-1 row 6 · Q10) ────────────────────────────
 * Visually hidden until focus; jumps from off-screen into the page when
 * keyboard-focused as the first Tab stop on the marking view. Anchor
 * target is `#rubric-scoring` (CF-3 change D) — the skip-link only ships
 * in the same bundle as that id.
 */
.fk-skip-link {
  position: absolute; top: 0; left: 0;
  padding: 8px 14px;
  background: var(--fk-status-info-fg, #2563EB); color: #fff;
  font-weight: 600; text-decoration: none;
  transform: translateY(-110%); transition: transform .2s ease;
  z-index: 2000;
}
.fk-skip-link:focus,
.fk-skip-link:focus-visible {
  transform: translateY(0);
  box-shadow: var(--fk-focus-shadow);
}

    /* ── Page-host styles ──────────────────────────────────── */
    /* Body background is #F8FAFC (slate-50) — matches Scene 1's painted bg
       and makes axe contrast checks pass against the ancestor chain. The
       dark scenes (4, 7) paint their own canvas bg on top, so visual
       composition is unaffected. */
    html, body { margin: 0; padding: 0; height: 100%; background: #F8FAFC; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    #root { position: fixed; inset: 0; }
    @keyframes fk-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.3); opacity: 0.4; }
    }
    @keyframes fk-click-ping {
      0%   { transform: scale(0.4); opacity: 0.9; }
      100% { transform: scale(1.4); opacity: 0; }
    }

  <!-- 1. animations.jsx -->
  <script type="text/babel" data-presets="react">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Expose seek/play API on window for external scripting (PPTX export, etc.)
  React.useEffect(() => {
    window.__videoSeek = (t) => {
      setTime(clamp(t, 0, duration));
      setPlaying(false);
    };
    window.__videoPlay = () => setPlaying(true);
    window.__videoPause = () => setPlaying(false);
    return () => {
      delete window.__videoSeek;
      delete window.__videoPlay;
      delete window.__videoPause;
    };
  }, [duration]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#F8FAFC',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <div data-capture-hide="1" style={{ display: 'contents' }}>
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
      </div>
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {

  Sprite, SpriteContext, useSprite,

function FKBtn({ children, variant = 'primary', size = 'md', pressed = false, style }) {

function WizStep5({ t }) {
  const intro = 'Kia ora ${first_name}, thanks for submitting your ${assessment_name}. Below are my comments grouped by criterion.';
  const outro = 'Overall this work sits at ${grade}. ${closing_note} If you\'d like to talk this through, my office hours are listed on Moodle.';
  // Sequential typing — intro types first, then outro. At any moment
  // exactly one caret is visible so the still frame never reads as
  // two-simultaneous-edits.
  const introStart = 0.3;
  const introSpeed = 0.012;
  const introDur   = intro.length * introSpeed;          // ~1.39s
  const outroStart = introStart + introDur + 0.2;        // ~1.9s
  const outroSpeed = 0.012;
  const charsI = Math.floor(clamp((t - introStart) / introSpeed, 0, intro.length));
  const charsO = Math.floor(clamp((t - outroStart) / outroSpeed, 0, outro.length));
  const i1 = intro.slice(0, charsI);
  const i2 = outro.slice(0, charsO);
  const introTyping = charsI > 0 && charsI < intro.length;
  const outroTyping = charsO > 0 && charsO < outro.length;
  const tokens = ['${first_name}', '${assessment_name}', '${grade}', '${closing_note}'];

  function Highlighted({ text, caret }) {
    let html = text;

      [4.0,   650, 380],   // crit2 dropdown

      [8.4,   650, 500],   // crit4 dropdown

      [10.8,  1330, 230],  // arrive over Copy button

        const span = next[0] - cur[0];
        const local = clamp((t - cur[0]) / span, 0, 1);

        return {
          x: cur[1] + (next[1] - cur[1]) * e,

          const justImported = localTime >= importStart && localTime < importStart + 0.5;
          return (
            <div key={t.name} style={{
              position: 'absolute',
              bottom: 0, left: `calc(${centerPct}% - 170px)`,
              width: 340, height: 240,
              background: FK.white,
              border: `1px solid ${imported ? FK.successBg : FK.slate200}`,
              boxShadow: justImported ? `0 0 0 3px rgba(4,120,87,0.18)` : '0 12px 32px rgba(15,23,42,0.08)',
              borderRadius: 18,
              padding: '20px 22px',
              display: 'flex', flexDirection: 'column',
              transition: 'all 0.3s ease',
              zIndex: 2,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
                <div style={{
                  width: 40, height: 40, borderRadius: 20,
                  background: t.avatarBg, color: t.avatarFg,
                  display: 'grid', placeItems: 'center',
                  fontSize: 14, fontWeight: 800,
                }}>{t.initials}</div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: FK.ink }}>{t.name}</div>
                  <div style={{ fontSize: 11, color: FK.inkMute }}>{t.role}</div>
                </div>
              </div>
              <div style={{
                flex: 1,
                background: imported ? FK.successBg + '70' : FK.slate50,
                border: `1px dashed ${imported ? FK.successFg : FK.slate200}`,
                borderRadius: 10,
                padding: 12,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                gap: 6,
                transition: 'all 0.4s ease',
              }}>
                {imported ? (
                  <>
                    <div style={{ fontSize: 24 }}>✓</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: FK.successFg, textAlign: 'center' }}>Lab Report 2 · loaded</div>
                    <div style={{ fontSize: 10, color: FK.inkSoft, textAlign: 'center' }}>4 criteria · 16 descriptors</div>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize: 22 }}>⬆</div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: FK.inkSoft }}>Upload scorer.json</div>
                  </>
                )}
              </div>
            </div>
          );
        })}

        {/* Flying JSON files — one per tutor, fanning out from the coord card */}
        {[0, 1, 2].map(i => {
          const launchT = tFlight + i * 0.18;
          const arriveT = tImports + i * 0.4;
          const flightSpan = Math.max(0.2, arriveT - launchT);
          const ft = clamp((localTime - launchT) / flightSpan, 0, 1);
          if (ft <= 0 || ft >= 1) return null;
          const fe = Easing.easeInOutCubic(ft);
          const targetPct = [16, 50, 84][i];
          const xPct = 50 + (targetPct - 50) * fe;
          const startY = 230;
          const targetY = 540;
          const y = startY + (targetY - startY) * fe;
          const tilt = (targetPct - 50) * 0.15 * (1 - fe);
          return (
            <div key={i} style={{
              position: 'absolute',
              left: `${xPct}%`,
              top: `${y}px`,
              transform: `translate(-50%, -50%) rotate(${tilt}deg) scale(${0.85 + 0.15 * (1 - Math.abs(fe - 0.5) * 2)})`,
              zIndex: 5,
              opacity: ft < 0.85 ? 1 : (1 - (ft - 0.85) / 0.15),
            }}>
              <FileChip />
            </div>
          );
        })}
      </div>

      {/* Caption */}
      {localTime >= tCaption && (
        <div style={{
          opacity: clamp((localTime - tCaption) / 0.5, 0, 1),
          marginTop: 30, textAlign: 'center',
        }}>
          <div style={{
            display: 'inline-block',
            padding: '16px 28px',
            background: FK.ink, color: FK.white,
            borderRadius: 14,
            fontSize: 19, fontWeight: 600,
            letterSpacing: '-0.01em',
            lineHeight: 1.4,
            maxWidth: 920,
          }}>
            Everyone grades against the same rubric, same descriptors, same feedback language.
          </div>
        </div>
      )}
    </div>
  );
}

function FileChip() {
  return (
    <div style={{
      width: 64, height: 80, borderRadius: 8,
      background: FK.white,
      border: `2px solid ${FK.blue}`,
      boxShadow: '0 10px 24px rgba(15,23,42,0.18)',
      position: 'relative',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      gap: 4,
    }}>
      <div style={{
        position: 'absolute', top: -1, right: -1,
        width: 14, height: 14,
        background: 'linear-gradient(135deg, transparent 50%, ' + FK.slate200 + ' 50%)',
      }} />
      <div style={{ fontSize: 20 }}>📄</div>
      {/* JSON label — bumped from 8px to 11px and darkened from FK.blue
          (#2563EB, 4.5:1) to #1E3A8A (10.4:1) for clean Axe pass. */}
      <div style={{
        fontSize: 11, fontWeight: 800,
        letterSpacing: '0.08em',
        color: '#1E3A8A',
        fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      }}>JSON</div>
    </div>
  );
}

Object.assign(window, { Scene5Snippets, Scene6Share });
  </script>

  <!-- 7. Inline timeline + ReactDOM.render -->
  <script type="text/babel" data-presets="react">
    // ── Scene timing config ───────────────────────────────────────────
    // Central source of truth for scene durations and labels. Each scene
    // overlaps its neighbour by OVERLAP seconds so the cross-fade between
    // them is seamless.
    //
    // Pacing reference: Scene 5 (snippets) is the "relaxed" benchmark.
    // Scenes 3 and 4 were bumped from the original v1 timing to match
    // Scene 5's per-action breathing room (post-Steve review 2026-05-21).
    // Scene 4 trimmed back to 22.0s on 2026-05-22 to cut idle dead-air
    // after the Copy click (Steve note).
    const OVERLAP = 0.5;
    const SCENE_TIMING = {
      title:    { duration:  5.6, label: '01 · Welcome' },
      overview: { duration: 17.5, label: '02 · The whole loop' },
      wizard:   { duration: 22.0, label: '03 · Build a scorer' },
      marking:  { duration: 16.5, label: '04 · Mark a student' },
      snippets: { duration: 15.5, label: '05 · Personalise' },
      share:    { duration: 12.5, label: '06 · Share with your team' },
      privacy:  { duration: 11.5, label: '07 · Privacy by design' },
    };

    // Build SCENES array from the config. Each scene's start is the
    // previous scene's (end − OVERLAP); end is start + duration.
    const SCENES = (() => {
      const order = ['title','overview','wizard','marking','snippets','share','privacy'];
      const renderers = {
        title:    () => <Scene1Title />,
        overview: () => <Scene2Overview />,
        wizard:   () => <Scene3Wizard />,
        marking:  () => <Scene4Marking />,
        snippets: () => <Scene5Snippets />,
        share:    () => <Scene6Share />,
        privacy:  () => <Scene7Privacy />,
      };
      let cursor = 0;
      return order.map((id, i) => {
        const start = i === 0 ? 0 : cursor - OVERLAP;
        const end   = start + SCENE_TIMING[id].duration;
        cursor = end;
        return { id, start, end, render: renderers[id] };
      });
    })();
    const TOTAL_DURATION = SCENES[SCENES.length - 1].end;

    // Small overlay that names the current scene + shows running time.
    // Lives outside scenes so it persists across cross-fades.
    function ChapterOverlay() {
      const { time, duration } = useTimeline();
      const active = [...SCENES].reverse().find(s => time >= s.start) || SCENES[0];
      const labels = Object.fromEntries(
        Object.entries(SCENE_TIMING).map(([id, t]) => [id, t.label])
      );
      // Format mm:ss with clamp + Math.round so the timer stays smooth at
      // the tail and never jumps from 1:36 → 1:45 (Steve note, fixed).
      const fmt = (s) => {
        const clamped = Math.max(0, Math.min(duration, s));
        const rounded = Math.round(clamped);
        const m = Math.floor(rounded / 60);
        const sec = (rounded % 60).toString().padStart(2, '0');
        return `${m}:${sec}`;
      };
      const cur   = fmt(time);
      const total = fmt(duration);
      return (
        <div style={{
          position: 'absolute', top: 24, right: 32,
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '8px 14px',
          background: 'rgba(15,23,42,0.78)',
          backdropFilter: 'blur(8px)',
          color: '#F1F5F9',
          borderRadius: 999,
          fontSize: 12, fontWeight: 600,
          letterSpacing: '0.08em', textTransform: 'uppercase',
          fontFamily: 'Inter, system-ui, sans-serif',
          zIndex: 100, pointerEvents: 'none',
          whiteSpace: 'nowrap',
        }}>
          <span style={{
            width: 8, height: 8, borderRadius: 4,
            background: '#60A5FA',
            animation: 'fk-pulse 1.6s ease-in-out infinite',
          }} />
          <span>{labels[active.id]}</span>
          <span style={{
            color: '#CBD5E1',
            letterSpacing: 0,
          }}>{cur} / {total}</span>
        </div>
      );
    }

    function Video() {
      return (
        <Stage
          width={1920} height={1080}
          duration={TOTAL_DURATION}
          background="#0F172A"
          loop={false}
        >
          {SCENES.map(s => (
            <Sprite key={s.id} start={s.start} end={s.end}>
              {s.render()}
            </Sprite>
          ))}
          <ChapterOverlay />
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Video />);
  </script>

</body>
